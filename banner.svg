<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Dark premium background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040404"/>
      <stop offset="50%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#070707"/>
    </linearGradient>

    <!-- Neon gradient -->
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00ffcc">
    <path d="M0 60 H1000"/>
    <path d="M0 120 H1000"/>
    <path d="M0 180 H1000"/>
    <path d="M0 240 H1000"/>
  </g>

  <!-- Moving scan line -->
  <rect x="-200" y="60" width="200" height="2" fill="#00ffcc" opacity="0.4">
    <animate attributeName="x" from="-200" to="1000" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Main frame -->
  <rect x="120" y="75" width="760" height="150" rx="20"
        fill="none" stroke="url(#neon)" stroke-width="2.5"
        filter="url(#glow)">
  </rect>

  <!-- Title -->
  <text x="500" y="140" text-anchor="middle"
        font-size="40" fill="#00ffcc"
        font-family="Verdana"
        filter="url(#glow)">
    DARK-SILENCE-MD
  </text>

  <!-- Subtitle -->
  <text x="500" y="185" text-anchor="middle"
        font-size="17" fill="#cfcfcf" opacity="0.9">
    POWERED BY SILENTLOVER ❤️
  </text>

  <!-- Minimal snow (soft premium effect) -->
  <g fill="#ffffff" opacity="0.6">

    <circle cx="150" cy="30" r="2">
      <animate attributeName="cy" values="0;320" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="400" cy="10" r="1.8">
      <animate attributeName="cy" values="0;320" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="650" cy="25" r="2">
      <animate attributeName="cy" values="0;320" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="850" cy="15" r="1.5">
      <animate attributeName="cy" values="0;320" dur="5.5s" repeatCount="indefinite"/>
    </circle>

  </g>

</svg>
