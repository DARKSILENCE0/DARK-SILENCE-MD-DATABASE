<svg width="1400" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Soft Dark Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050607"/>
      <stop offset="100%" stop-color="#0c0f12"/>
    </linearGradient>

    <!-- Soft Neon -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>

    <!-- Soft Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1400" height="500" fill="url(#bg)"/>

  <!-- MAIN GLASS CARD -->
  <rect x="300" y="120" width="800" height="260" rx="25"
        fill="rgba(255,255,255,0.04)"
        stroke="rgba(0,255,204,0.3)"
        stroke-width="1.5"
        filter="url(#glow)"/>

  <!-- TITLE -->
  <text x="700" y="220"
        text-anchor="middle"
        font-size="64"
        fill="url(#neon)"
        font-family="Arial, sans-serif"
        font-weight="600"
        letter-spacing="2"
        filter="url(#glow)">
    DARK-SILENCE-MD
  </text>

  <!-- SUBTITLE -->
  <text x="700" y="270"
        text-anchor="middle"
        font-size="20"
        fill="#cfd6dd"
        font-family="Arial, sans-serif"
        opacity="0.9">
    WhatsApp AI Bot • Smooth Cyber Edition
  </text>

  <!-- STATUS BAR (Phone Style) -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#e6e6e6">

    <rect x="350" y="70" width="700" height="35" rx="18"
          fill="rgba(255,255,255,0.05)"
          stroke="rgba(255,255,255,0.08)"/>

    <!-- Time -->
    <text x="380" y="93">12:45 PM</text>

    <!-- Network -->
    <text x="520" y="93">📶 LTE</text>

    <!-- Date -->
    <text x="620" y="93">16 Apr 2026</text>

    <!-- Battery -->
    <text x="900" y="93">🔋 87%</text>

  </g>

  <!-- SOFT FLOATING DOTS (LIGHT ANIMATION FEEL) -->
  <g fill="#00ffcc" opacity="0.4">
    <circle cx="200" cy="150" r="2"/>
    <circle cx="1200" cy="180" r="1.8"/>
    <circle cx="250" cy="380" r="2.2"/>
    <circle cx="1150" cy="350" r="1.5"/>
  </g>

  <!-- Bottom glow line -->
  <rect x="450" y="340" width="500" height="2"
        fill="url(#neon)" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

</svg>
