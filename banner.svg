<svg width="1400" height="1600" viewBox="0 0 1400 1600" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050607"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </linearGradient>

    <!-- Neon -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="1400" height="1600" fill="url(#bg)"/>

  <!-- TITLE -->
  <text x="700" y="100"
        text-anchor="middle"
        font-size="52"
        fill="url(#neon)"
        font-family="Arial"
        font-weight="700"
        filter="url(#glow)">
    DARK-SILENCE-MD
  </text>

  <text x="700" y="140"
        text-anchor="middle"
        font-size="18"
        fill="#cfd6dd">
    WhatsApp AI Bot • Cyber Edition
  </text>

  <!-- PROJECT INFO -->
  <rect x="150" y="200" width="1100" height="200" rx="20"
        fill="rgba(255,255,255,0.03)" stroke="rgba(0,255,204,0.3)"/>

  <text x="700" y="260" text-anchor="middle" fill="#ffffff" font-size="18">
    This project is no longer alive.
  </text>

  <text x="700" y="300" text-anchor="middle" fill="#ffffff" font-size="16">
    It exists now only in memories and lines of code.
  </text>

  <text x="700" y="340" text-anchor="middle" fill="#00ffcc" font-size="16">
    © SILENT LOVER 432 💫🤍
  </text>

  <!-- FEATURES -->
  <rect x="150" y="450" width="1100" height="220" rx="20"
        fill="rgba(255,255,255,0.02)" stroke="rgba(0,255,204,0.2)"/>

  <text x="700" y="510" text-anchor="middle" fill="url(#neon)" font-size="20">
    FEATURES
  </text>

  <text x="700" y="560" text-anchor="middle" fill="#cfd6dd">
    ⚡ Fast • Secure • Multi Device
  </text>

  <text x="700" y="600" text-anchor="middle" fill="#cfd6dd">
    🤖 AI Chat System • 🌐 24/7 Online
  </text>

  <!-- DEPLOYMENT -->
  <rect x="150" y="730" width="1100" height="220" rx="20"
        fill="rgba(255,255,255,0.02)" stroke="rgba(0,255,204,0.25)"/>

  <text x="700" y="790" text-anchor="middle"
        fill="url(#neon)" font-size="22" font-weight="600">
    🚀 DEPLOYMENT OPTIONS
  </text>

  <text x="700" y="850" text-anchor="middle" fill="#cfd6dd">
    • Heroku Deployment ✔
  </text>

  <text x="700" y="890" text-anchor="middle" fill="#cfd6dd">
    • Tender Deployment ✔
  </text>

  <text x="700" y="930" text-anchor="middle" fill="#cfd6dd">
    • Render / Railway / Koyeb Support ✔
  </text>

  <!-- WARNING -->
  <rect x="150" y="1000" width="1100" height="300" rx="20"
        fill="rgba(255,0,0,0.02)" stroke="rgba(255,0,0,0.2)"/>

  <text x="700" y="1060" text-anchor="middle" fill="#ff4d4d" font-size="20">
    ⚠️ DISCLAIMER ⚠️
  </text>

  <text x="700" y="1120" text-anchor="middle" fill="#ffffff" font-size="16">
    Use at your own risk. Misuse may cause bans.
  </text>

  <text x="700" y="1160" text-anchor="middle" fill="#ffffff" font-size="16">
    Not affiliated with WhatsApp Inc.
  </text>

  <text x="700" y="1220" text-anchor="middle" fill="url(#neon)" font-size="16">
    THANK YOU FOR USING DARK-SILENCE-MD
  </text>

</svg>
