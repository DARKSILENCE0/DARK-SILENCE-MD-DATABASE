<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Enhanced Background gradient -->
    <radialGradient id="bg-radial" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Multi-color neon gradient -->
    <linearGradient id="neon-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="stop-color" values="#00f5ff;#39ff14;#00f5ff;#8a2be2;#00f5ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#39ff14">
        <animate attributeName="stop-color" values="#39ff14;#8a2be2;#39ff14;#00f5ff;#39ff14" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8a2be2">
        <animate attributeName="stop-color" values="#8a2be2;#00f5ff;#8a2be2;#39ff14;#8a2be2" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Secondary neon -->
    <linearGradient id="neon-sec" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ff88;#ff00ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00ff88">
        <animate attributeName="stop-color" values="#00ff88;#ff00ff;#00ff88" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Advanced glow filter -->
    <filter id="glow-neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Enhanced pulse -->
    <filter id="pulse-glow">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="glow1"/>
      <feComposite in="glow1" in2="blur1" operator="in" result="coloredGlow"/>
      <feMerge>
        <feMergeNode in="coloredGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan line effect -->
    <filter id="scanline">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>

    <!-- Text shadow -->
    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3"/>
    </filter>

    <!-- Floating particles pattern -->
    <pattern id="particles" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#00f5ff" opacity="0.6">
        <animate attributeName="r" values="1;2;1" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 5,-5; 0,0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="80" cy="40" r="1" fill="#39ff14" opacity="0.4">
        <animate attributeName="r" values="0.5;1.5;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="80" r="0.8" fill="#8a2be2" opacity="0.5">
        <animate attributeName="r" values="0.3;1.2;0.3" dur="3s" repeatCount="indefinite"/>
      </circle>
    </pattern>

  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-radial)"/>

  <!-- Floating particles -->
  <rect x="0" y="0" width="1200" height="400" fill="url(#particles)" opacity="0.3"/>

  <!-- Corner ambient lights -->
  <circle cx="80" cy="80" r="12" fill="url(#neon-sec)" filter="url(#glow-neon)">
    <animate attributeName="r" values="8;16;12;20;8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.6;1;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1120" cy="80" r="12" fill="#00f5ff" filter="url(#glow-neon)">
    <animate attributeName="r" values="8;16;12;20;8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.6;1;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="80" cy="320" r="12" fill="#39ff14" filter="url(#glow-neon)">
    <animate attributeName="r" values="8;16;12;20;8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1120" cy="320" r="12" fill="#ff00ff" filter="url(#glow-neon)">
    <animate attributeName="r" values="8;16;12;20;8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Main futuristic frame -->
  <g filter="url(#pulse-glow)">
    <!-- Outer glow frame -->
    <rect x="100" y="60" width="1000" height="280" rx="25" ry="25"
          fill="none" stroke="url(#neon-main)" stroke-width="4"/>

    <!-- Inner frame -->
    <rect x="130" y="90" width="940" height="220" rx="20" ry="20"
          fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

    <!-- Corner highlights -->
    <circle cx="130" cy="110" r="8" fill="url(#neon-sec)" filter="url(#glow-neon)"/>
    <circle cx="1070" cy="110" r="8" fill="#00f5ff" filter="url(#glow-neon)"/>
    <circle cx="130" cy="290" r="8" fill="#39ff14" filter="url(#glow-neon)"/>
    <circle cx="1070" cy="290" r="8" fill="#ff00ff" filter="url(#glow-neon)"/>
  </g>

  <!-- Dynamic scan line -->
  <rect x="-300" y="75" width="250" height="2.5" rx="1" fill="url(#neon-main)" opacity="0.7" filter="url(#glow-neon)">
    <animate attributeName="x" from="-300" to="1300" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Main title with advanced effects -->
  <g filter="url(#text-shadow)">
    <text x="600" y="165" text-anchor="middle" dominant-baseline="middle"
          font-size="52" font-weight="bold" fill="url(#neon-main)"
          font-family="'Orbitron', 'Rajdhani', monospace" filter="url(#pulse-glow)">
      DARK-SILENCE-MD
    </text>
  </g>

  <!-- Subtitle with glow -->
  <text x="600" y="215" text-anchor="middle" dominant-baseline="middle"
        font-size="22" fill="#ffffff" font-weight="500"
        font-family="'Orbitron', monospace" filter="url(#glow-neon)"
        opacity="0.9">
    🚀 POWERED BY SILENTLOVER043 ❤️
  </text>

  <!-- Status indicators -->
  <g transform="translate(150, 280)">
    <circle cx="0" cy="0" r="6" fill="#00ff88" filter="url(#glow-neon)">
      <animate attributeName="r" values="4;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="6" font-size="14" fill="#00ff88" font-family="monospace">● LIVE</text>
  </g>

  <g transform="translate(950, 280)">
    <circle cx="0" cy="0" r="6" fill="#ffaa00" filter="url(#glow-neon)">
      <animate attributeName="r" values="4;8;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="6" font-size="14" fill="#ffaa00" font-family="monospace">● SYNCED</text>
  </g>

  <!-- Bottom scan wave -->
  <path d="M 0 380 Q 300 360 600 380 T 1200 380" fill="none" stroke="url(#neon-sec)" stroke-width="1.5">
    <animate attributeName="d" values="
      M 0 380 Q 300 360 600 380 T 1200 380;
      M 0 380 Q 200 365 500 375 T 1200 380;
      M 0 380 Q 400 355 700 385 T 1200 380;
      M 0 380 Q 300 360 600 380 T 1200 380
    " dur="8s" repeatCount="indefinite"/>
  </path>

</svg>
